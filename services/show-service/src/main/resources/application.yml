spring:
  application:
    name: show-service
  data:
    mongodb:
      uri: mongodb://admin:admin_password@localhost:27017/movie_booking?authSource=admin
  jpa:
    show-sql: false
  redis:
    host: localhost
    port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8083

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    com.moviebooking: DEBUG