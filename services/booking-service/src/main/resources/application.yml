spring:
  application:
    name: booking-service
  data:
    mongodb:
      uri: mongodb://admin:admin_password@localhost:27017/movie_booking?authSource=admin
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  redis:
    host: localhost
    port: 6379

server:
  port: 8084

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

booking:
  expiry:
    minutes: 15

logging:
  level:
    com.moviebooking: DEBUG